<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>ThinkOut · Wordle</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../public/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../public/favicon/favicon-light-32x32.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="../public/favicon/favicon-light-16x16.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="../public/favicon/favicon-dark-32x32.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="16x16" href="../public/favicon/favicon-dark-16x16.png" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div class="header-left">
          <div class="logo-row">
            <a href="/"><img src="../public/logo.svg" alt="ThinkOut" class="logo" /></a>
          </div>
          <p class="tagline">Guess the word in six tries</p>
        </div>
      </header>

      <!-- Board -->
      <div id="board">
        <!-- Row 0 -->
        <div class="row" data-row="0">
          <div class="tile" data-col="0"></div>
          <div class="tile" data-col="1"></div>
          <div class="tile" data-col="2"></div>
          <div class="tile" data-col="3"></div>
          <div class="tile" data-col="4"></div>
        </div>
        <!-- Row 1 -->
        <div class="row" data-row="1">
          <div class="tile" data-col="0"></div>
          <div class="tile" data-col="1"></div>
          <div class="tile" data-col="2"></div>
          <div class="tile" data-col="3"></div>
          <div class="tile" data-col="4"></div>
        </div>
        <!-- Row 2 -->
        <div class="row" data-row="2">
          <div class="tile" data-col="0"></div>
          <div class="tile" data-col="1"></div>
          <div class="tile" data-col="2"></div>
          <div class="tile" data-col="3"></div>
          <div class="tile" data-col="4"></div>
        </div>
        <!-- Row 3 -->
        <div class="row" data-row="3">
          <div class="tile" data-col="0"></div>
          <div class="tile" data-col="1"></div>
          <div class="tile" data-col="2"></div>
          <div class="tile" data-col="3"></div>
          <div class="tile" data-col="4"></div>
        </div>
        <!-- Row 4 -->
        <div class="row" data-row="4">
          <div class="tile" data-col="0"></div>
          <div class="tile" data-col="1"></div>
          <div class="tile" data-col="2"></div>
          <div class="tile" data-col="3"></div>
          <div class="tile" data-col="4"></div>
        </div>
        <!-- Row 5 -->
        <div class="row" data-row="5">
          <div class="tile" data-col="0"></div>
          <div class="tile" data-col="1"></div>
          <div class="tile" data-col="2"></div>
          <div class="tile" data-col="3"></div>
          <div class="tile" data-col="4"></div>
        </div>
      </div>

      <!-- Keyboard -->
      <div id="keyboard">
        <div class="kb-row">
          <button class="key" data-key="Q">Q</button>
          <button class="key" data-key="W">W</button>
          <button class="key" data-key="E">E</button>
          <button class="key" data-key="R">R</button>
          <button class="key" data-key="T">T</button>
          <button class="key" data-key="Y">Y</button>
          <button class="key" data-key="U">U</button>
          <button class="key" data-key="I">I</button>
          <button class="key" data-key="O">O</button>
          <button class="key" data-key="P">P</button>
        </div>
        <div class="kb-row">
          <div class="kb-spacer-half"></div>
          <button class="key" data-key="A">A</button>
          <button class="key" data-key="S">S</button>
          <button class="key" data-key="D">D</button>
          <button class="key" data-key="F">F</button>
          <button class="key" data-key="G">G</button>
          <button class="key" data-key="H">H</button>
          <button class="key" data-key="J">J</button>
          <button class="key" data-key="K">K</button>
          <button class="key" data-key="L">L</button>
          <div class="kb-spacer-half"></div>
        </div>
        <div class="kb-row">
          <button class="key key-wide" data-key="ENTER">Enter</button>
          <button class="key" data-key="Z">Z</button>
          <button class="key" data-key="X">X</button>
          <button class="key" data-key="C">C</button>
          <button class="key" data-key="V">V</button>
          <button class="key" data-key="B">B</button>
          <button class="key" data-key="N">N</button>
          <button class="key" data-key="M">M</button>
          <button class="key key-wide" data-key="BACKSPACE">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="18" viewBox="0 0 24 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Toast container -->
      <div id="toasts"></div>

      <!-- Result overlay -->
      <div id="resultOverlay" class="result-overlay hidden">
        <div class="result-content">
          <h2 id="resultTitle"></h2>
          <p id="resultMsg" class="result-msg"></p>
          <div id="resultBoard" class="result-board"></div>
          <div class="result-buttons">
            <button id="shareBtn" class="btn">Share</button>
            <button id="playAgainBtn" class="btn btn-outline">Play again</button>
          </div>
          <a href="/" class="result-link">Back to games</a>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
