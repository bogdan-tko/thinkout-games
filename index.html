<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThinkOut · 10 Years of Building</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="public/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="public/favicon/favicon-light-32x32.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="public/favicon/favicon-light-16x16.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="public/favicon/favicon-dark-32x32.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="public/favicon/favicon-dark-16x16.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="stylesheet" href="shared.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .home {
        width: 100%;
        max-width: 500px;
        padding: 32px 16px;
        text-align: center;
      }
      .home-logo {
        height: 24px;
        margin-bottom: 8px;
      }
      .home-tagline {
        font-size: 14px;
        color: #71717a;
        margin-bottom: 40px;
      }
      .games-grid {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .game-card {
        display: flex;
        align-items: center;
        gap: 20px;
        background: #27272a;
        border-radius: 14px;
        padding: 24px;
        text-align: left;
        transition:
          transform 200ms ease,
          box-shadow 200ms ease;
        cursor: pointer;
      }
      .game-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .game-card.disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .game-icon {
        font-size: 40px;
        line-height: 1;
        flex-shrink: 0;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #3f3f46;
        border-radius: 12px;
      }
      .game-info {
        flex: 1;
      }
      .game-name {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
      }
      .game-desc {
        font-size: 13px;
        color: #a1a1aa;
        line-height: 1.4;
      }
      .game-badge {
        font-size: 11px;
        font-weight: 600;
        color: #71717a;
        background: #3f3f46;
        padding: 4px 10px;
        border-radius: 20px;
        margin-top: 8px;
        display: inline-block;
      }
      .home-footer {
        margin-top: 48px;
        font-size: 13px;
        color: #a1a1aa;
      }
      .home-footer a {
        color: #71717a;
        text-decoration: underline;
        transition: color 200ms ease;
      }
      .home-footer a:hover {
        color: #27272a;
      }
    </style>
  </head>
  <body>
    <div class="home">
      <img src="public/logo.svg" alt="ThinkOut" class="home-logo" />
      <p class="home-tagline"></p>

      <div class="games-grid">
        <a href="/brick-by-brick/" class="game-card">
          <div class="game-icon">🧱</div>
          <div class="game-info">
            <div class="game-name">Brick by Brick</div>
            <div class="game-desc">
              Merge tiles and build your business from a single brick to a
              thriving Polis.
            </div>
          </div>
        </a>

        <a href="/connections/" class="game-card">
          <div class="game-icon">🔗</div>
          <div class="game-info">
            <div class="game-name">Connections</div>
            <div class="game-desc">
              Find the four groups of four. How well do you know the builder's
              vocabulary?
            </div>
          </div>
        </a>

        <a href="/wordle/" class="game-card">
          <div class="game-icon">🔤</div>
          <div class="game-info">
            <div class="game-name">Wordle</div>
            <div class="game-desc">
              Guess the builder's word in six tries. Every letter counts.
            </div>
          </div>
        </a>
      </div>

      <div class="home-footer">
        <a href="https://thinkout.io" target="_blank">thinkout.io</a>
      </div>
    </div>
  </body>
</html>
